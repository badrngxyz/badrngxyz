name: Quality

on:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup and Install
        uses: ./.github/actions/setup

      - name: Check formatting
        run: pnpm check:format

      - name: Build project
        run: pnpm build
